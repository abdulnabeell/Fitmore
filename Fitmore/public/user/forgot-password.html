<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FITMORE</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Page Specific Styles */
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 80px;
            /* Top padding for fixed header */
        }

        .auth-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .auth-desc {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: white;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-auth {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-auth:hover {
            background: var(--accent-hover);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                padding: 2rem;
            }

            .auth-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header" id="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent)">
                    <path d="M6 10H3a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-3"></path>
                    <path d="M8 10v10"></path>
                    <path d="M16 10v10"></path>
                </svg>
                FITMORE
            </a>

            <nav>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html" class="nav-item">Home</a></li>
                    <li><a href="shop.html" class="nav-item">Shop</a></li>
                    <li><a href="contact.html" class="nav-item">Contact</a></li>
                    <li><a href="signup.html" class="nav-item">Sign Up</a></li>
                </ul>
            </nav>

            <div class="mobile-toggle" id="mobileToggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Forgot Password</h1>
            <p class="auth-desc">Enter your email to receive a verification code</p>

            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="example@email.com" required>
                </div>

                <button type="submit" class="btn-auth">Send Verification Code</button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="f-col">
                    <a href="index.html" class="logo" style="margin-bottom:1rem">FITMORE</a>
                    <p style="color:var(--text-muted); font-size:0.9rem;">The premium destination for serious athletes.
                    </p>
                </div>
                <div class="f-col">
                    <h4>Support</h4>
                    <ul class="f-links">
                        <li><a href="contact.html">Contact Us</a></li>
                        <li><a href="#">Help Center</a></li>
                    </ul>
                </div>
                <div class="f-col">
                    <h4>Account</h4>
                    <ul class="f-links">
                        <li><a href="login.html">Login</a></li>
                        <li><a href="signup.html">Register</a></li>
                    </ul>
                </div>
            </div>
            <div class="copyright">&copy; 2026 FITMORE. All Rights Reserved.</div>
        </div>
    </footer>

    <!-- Script -->
    <!-- SweetAlert2 & Custom Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/alert.js"></script>

    <script>
        // Navbar Toggle
        const mobileToggleBtn = document.getElementById('mobileToggle');
        const mobileNavLinks = document.getElementById('navLinks');

        if (mobileToggleBtn) {
            mobileToggleBtn.addEventListener('click', () => {
                mobileNavLinks.classList.toggle('active');
            });
        }

        const forgotForm = document.getElementById('forgotForm');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = forgotForm.querySelector('input[type="email"]').value;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                successAlert('OTP sent to email').then(() => {
                    window.location.href = `otp-verification.html?userId=${data.userId}&mode=forgot`;
                });

            } catch (err) {
                errorAlert(err.message);
            }
        });
    </script>
</body>

</html>
