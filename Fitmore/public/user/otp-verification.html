    <style>
        /* Page Specific Styles matching verify-code.html */
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 80px;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .auth-desc {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: white;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: var(--transition);
            text-align: center;
            letter-spacing: 5px;
            font-size: 1.2rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-auth {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-auth:hover {
            background: var(--accent-hover);
        }

        .btn-auth:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .resend-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .resend-link a {
            color: white;
            text-decoration: underline;
            cursor: pointer;
        }

        .resend-link a.disabled {
            color: var(--text-muted);
            text-decoration: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                padding: 2rem;
            }

            .auth-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

                    <path d="M6 10H3a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-3"></path>
                    <path d="M8 10v10"></path>
                    <path d="M16 10v10"></path>

            </a>

            <nav>

    </header>

    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Verify Your Account</h1>
            <p class="auth-desc">Enter the 6-digit code we sent to your email to verify your account.</p>

            <form id="otpForm">
                <div class="form-group">
                    <input type="text" class="form-control" name="otp" placeholder="000000" maxlength="6"
                        pattern="\d{6}" required>
                </div>

                <button type="submit" class="btn-auth">Verify Code</button>

                <div class="resend-link">
                    Didn't receive code?
                    <a href="#" id="resendBtn">Resend</a>
                    <span id="timerText" style="display:none; margin-left: 5px; color: var(--text-muted);">(30s)</span>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->

        <div class="container">
            <div class="footer-grid">
                <div class="f-col">
                    <a href="index.html" class="logo" style="margin-bottom:1rem">FITMORE</a>
                    <p style="color:var(--text-muted); font-size:0.9rem;">The premium destination for serious athletes.
                    </p>
                </div>

                    </ul>
                </div>
            </div>
            <div class="copyright">&copy; 2026 FITMORE. All Rights Reserved.</div>
        </div>
    </footer>

        document.addEventListener('DOMContentLoaded', () => {

            // Navbar
            const mobileToggleBtn = document.getElementById('mobileToggle');
            const mobileNavLinks = document.getElementById('navLinks');

            if (mobileToggleBtn) {
                mobileToggleBtn.addEventListener('click', () => {
                    mobileNavLinks.classList.toggle('active');
                });
            }

            // Elements
            const otpForm = document.getElementById('otpForm');
            const otpInput = otpForm.querySelector('input[name="otp"]');
            const verifyBtn = otpForm.querySelector('button[type="submit"]');
            const resendBtn = document.getElementById('resendBtn');
            const timerText = document.getElementById('timerText');

            let timeLeft = 30;
            let timerId = null;

            //     return;
            // }
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('userId');
            const mode = params.get('mode');

            if (!userId) {
                errorAlert('Invalid access. Please signup again.');
                window.location.href = 'signup.html';
                return;
            }

            // Verify OTP
            //     otpForm.addEventListener('submit', async (e) => {
            //         e.preventDefault();

            //         const otp = otpInput.value.trim();
            //         if (!otp) return alert('Enter OTP');

            //         verifyBtn.innerText = 'Verifying...';
            //         verifyBtn.disabled = true;

            //         try {

            //                 method: 'POST',

            //                 body: JSON.stringify({ userId, otp })
            //             });

            //             const data = await res.json();
            //             if (!res.ok) throw new Error(data.message);

            //             alert('Account verified successfully!');
            //             // window.location.href = 'login.html';
            //             if (mode === 'signup') {
            //     window.location.href = 'login.html';
            // } else {
            //     window.location.href =
            //       `change-password.html?userId=${userId}&otp=${otp}`;
            // }


            //         } catch (err) {
            //             alert(err.message);
            //             verifyBtn.disabled = false;
            //             verifyBtn.innerText = 'Verify Code';
            //         }
            //     });
            otpForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const otp = otpInput.value.replace(/\s/g, '');

                if (!otp) return errorAlert('Enter OTP');

                verifyBtn.innerText = 'Verifying...';
                verifyBtn.disabled = true;

                try {

                    let url;
                    let body;
                    if (mode === 'signup') {
                        url = '/api/auth/verify-otp';
                        body = { userId, otp };
                    } else {
                        url = '/api/auth/verify-forgot-otp';
                        body = { userId, otp };
                    }


                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message);

                    if (mode === 'signup') {
                        window.location.href = 'login.html';
                    } else {
                        window.location.href =
                            `change-password.html?userId=${userId}&otp=${otp}`;
                    }

                } catch (err) {
                    errorAlert(err.message);
                    verifyBtn.disabled = false;
                    verifyBtn.innerText = 'Verify Code';
                }
            });

            // Resend OTP
            resendBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                if (resendBtn.classList.contains('disabled')) return;

                try {
                    const res = await fetch('/api/auth/resend-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId })
                    });

                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message);

                    successAlert('New OTP sent to email');
                    startResendTimer();

                } catch (err) {
                    errorAlert(err.message);
                }
            });

            function startResendTimer() {
                resendBtn.classList.add('disabled');
                timerText.style.display = 'inline';

                timeLeft = 30;
                timerText.innerText = `(${timeLeft}s)`;

                timerId = setInterval(() => {
                    timeLeft--;
                    timerText.innerText = `(${timeLeft}s)`;

                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        resendBtn.classList.remove('disabled');
                        timerText.style.display = 'none';
                    }
                }, 1000);
            }

        });
